<!doctype html>

<html>

<head>
	<script>
		
		function enter(e) {
			var v = document.getElementById('input').value;
			if (v == '' || (typeof e != 'undefined' && e.keyCode != 13)) {
				return;
			}
			document.getElementById('input').value = '';
			var scr = document.createElement('script');
			scr.appendChild(document.createTextNode(v));
			document.body.appendChild(scr);
		}
		
	</script>
	<style>
		
		body {
			margin: 128px 6.25%;
		}
		
		:focus {
			outline: 0;
		}
		
		input {
			font-family: monospace;
			background: 0;
			padding: 8px;
			border: 0;
		}
		
		input[type='text'] {
			width: 100%;
			border: 1px solid #000;
		}
		
	</style>
</head>

<body>

<div>
	<input name='script' type='submit' onclick='enter()' value='&lt;script&gt;' />
	<br/>
	<input name='script' id='input'	type='text' autofocus='autofocus' onkeydown='enter(event);' />
	<br/>
	<input name='script' type='submit' onclick='enter()' value='&lt;/script&gt;' />
</div>

</body>

</html>
