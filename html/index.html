<!doctype html>

<html>

<head>
	<title>JS Projects by Gramkraxor</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link href='../css/index.css' rel='stylesheet'/>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>

		var pages = [];

		var HTML = ".html";

		function page(file, name) {
			var r = {};
			r.file = (file.toLowerCase().endsWith(HTML))? file.substring(file.length - HTML.length) : file;
			r.name = (typeof name != "undefined")? name : r.file;
			pages.push(r);
		}

		page("ttt");
		page("dozer");
		page("eanto");
		page("calcs");
		page("clock");
		page("connect4");
		page("phi");
		page("dozagon");
		page("numblr");
		page("devx");
		page("calcs-al");

		$(function() {
			$("body").append($("<div/>").attr("id", "list"));
			for (let i = 0; i < pages.length; i++) {
				let link = pages[i].file;
				/*if (location.protocol == "file:")*/ link += HTML;
				$("#list").append($("<p/>")
					.addClass(pages[i].name)
					.append($("<a/>")
						.attr("href", link)
						.text("/" + pages[i].name)
					));
				}

				if (Math.random() > 0.5) {
					$("body").addClass("dark");
				}

			});

	</script>
</head>

<body></body>

</html>
