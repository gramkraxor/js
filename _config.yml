# Jekyll configuation for www.gramkraxor.com/js #

# Live JS projects live in /_projects

url: "https://www.gramkraxor.com"
baseurl: "/js"
layout: master
port: 80
markdown: kramdown
google_analytics: UA-111498946-2

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CNAME
  - html

collections:
  posts:
    output: true
  projects:
    output: true

defaults:
  -
    scope:
      path: ""
      type: projects
    values:
      layout: project
      permalink: /:name
