url: "https://www.gramkraxor.com"
baseurl: "/js"
port: 80
markdown: kramdown

author: "Gramkraxor"
google_analytics: "UA-111498946-2"
jquery: "https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CNAME # because of the baseurl
  - html

collections:
  posts:
    output: true
  projects:
    output: true

defaults:
  -
    scope:
      path: ""
      type: projects
    values:
      layout: project
      permalink: /:name
